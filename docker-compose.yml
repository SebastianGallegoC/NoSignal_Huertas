# NoSignal — Traefik + Let's Encrypt (HTTPS)
#
# Antes del primer arranque en el host (Linux/macOS):
#   mkdir -p letsencrypt
#   touch letsencrypt/acme.json && chmod 600 letsencrypt/acme.json
# Ver letsencrypt/README.txt
#
# Producción por dominio: nosignal.site + api.nosignal.site

services:
  traefik:
    image: traefik:v3.0
    container_name: nosignal-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "80:80"
      - "443:443"
    command:
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:-antoniopuentes344@gmail.com}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./letsencrypt/acme.json:/letsencrypt/acme.json
    networks:
      - nosignal-network

  db:
    image: postgis/postgis:16-3.4
    container_name: nosignal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nosignal
      POSTGRES_USER: nosignal
      POSTGRES_PASSWORD: nosignal
    ports:
      - "5433:5432"
    volumes:
      - nosignal_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nosignal -d nosignal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nosignal-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nosignal-backend
    restart: unless-stopped
    environment:
      APP_NAME: "NoSignal API"
      API_V1_PREFIX: "/api/v1"
      JWT_SECRET: "CHANGE_ME"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRES_MINUTES: "480"
      NOSIGNAL_AUTH_USERS: '{"demo":"demo"}'
      CORS_ORIGINS: ${CORS_ORIGINS:-https://nosignal.site}
      DATABASE_URL: "postgresql+asyncpg://nosignal:nosignal@db:5432/nosignal"
      UPLOAD_ROOT: "uploads"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - nosignal_uploads:/app/uploads
    networks:
      - nosignal-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=nosignal-network
      - traefik.http.routers.nosignal-api.rule=PathPrefix(`/api`)
      - traefik.http.routers.nosignal-api.entrypoints=web
      - traefik.http.routers.nosignal-api.priority=100
      - traefik.http.services.nosignal-api.loadbalancer.server.port=8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.nosignal.site}
    container_name: nosignal-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - nosignal-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=nosignal-network
      - traefik.http.routers.nosignal-frontend.rule=PathPrefix(`/`)
      - traefik.http.routers.nosignal-frontend.entrypoints=web
      - traefik.http.routers.nosignal-frontend.priority=1
      - traefik.http.services.nosignal-frontend.loadbalancer.server.port=80

volumes:
  nosignal_db:
  nosignal_uploads:

networks:
  nosignal-network:
    name: nosignal-network
    driver: bridge
