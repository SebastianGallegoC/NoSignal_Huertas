# NoSignal — Traefik para acceso por IP (HTTP)
#
# Antes del primer arranque en el host (Linux/macOS):
#   mkdir -p letsencrypt
#   touch letsencrypt/acme.json && chmod 600 letsencrypt/acme.json
# Ver letsencrypt/README.txt
#
# Sin dominio público no aplica Let's Encrypt HTTP-01. Esta configuración
# queda temporalmente en HTTP usando la IP pública del servidor.

services:
  traefik:
    image: traefik:v2.10
    container_name: nosignal-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "80:80"
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=nosignal-network
      - --entrypoints.web.address=:80
      # Nota: websecure/ACME se reactivan cuando tengas dominio.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - nosignal-network

  db:
    image: postgis/postgis:16-3.4
    container_name: nosignal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nosignal
      POSTGRES_USER: nosignal
      POSTGRES_PASSWORD: nosignal
    ports:
      - "5433:5432"
    volumes:
      - nosignal_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nosignal -d nosignal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nosignal-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nosignal-backend
    restart: unless-stopped
    environment:
      APP_NAME: "NoSignal API"
      API_V1_PREFIX: "/api/v1"
      JWT_SECRET: "CHANGE_ME"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRES_MINUTES: "480"
      NOSIGNAL_AUTH_USERS: '{"demo":"demo"}'
      CORS_ORIGINS: ${CORS_ORIGINS:-http://185.202.223.66}
      DATABASE_URL: "postgresql+asyncpg://nosignal:nosignal@db:5432/nosignal"
      UPLOAD_ROOT: "uploads"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - nosignal_uploads:/app/uploads
    networks:
      - nosignal-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=nosignal-network
      - traefik.http.routers.nosignal-api.rule=PathPrefix(`/api`)
      - traefik.http.routers.nosignal-api.entrypoints=web
      - traefik.http.routers.nosignal-api.priority=100
      - traefik.http.services.nosignal-api.loadbalancer.server.port=8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: nosignal-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - nosignal-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=nosignal-network
      - traefik.http.routers.nosignal-frontend.rule=PathPrefix(`/`)
      - traefik.http.routers.nosignal-frontend.entrypoints=web
      - traefik.http.routers.nosignal-frontend.priority=1
      - traefik.http.services.nosignal-frontend.loadbalancer.server.port=80

volumes:
  nosignal_db:
  nosignal_uploads:

networks:
  nosignal-network:
    name: nosignal-network
    driver: bridge
