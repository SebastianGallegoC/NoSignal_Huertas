# NoSignal — Traefik + Let's Encrypt (HTTPS)
#
# Antes del primer arranque en el host (Linux/macOS):
#   mkdir -p letsencrypt
#   touch letsencrypt/acme.json && chmod 600 letsencrypt/acme.json
# Ver letsencrypt/README.txt
#
# Producción por dominio: nosignal.site + api.nosignal.site

services:
  traefik:
    image: traefik:v3.0
    container_name: nosignal-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "443:443"
    command:
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:-antoniopuentes344@gmail.com}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./letsencrypt/acme.json:/letsencrypt/acme.json
    networks:
      - nosignal-network

  db:
    image: postgis/postgis:16-3.4
    container_name: nosignal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nosignal
      POSTGRES_USER: nosignal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - nosignal_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nosignal -d nosignal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nosignal-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nosignal-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      APP_NAME: "NoSignal API"
      API_V1_PREFIX: "/api/v1"
      JWT_SECRET: ${JWT_SECRET:?set_JWT_SECRET}
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRES_MINUTES: "480"
      NOSIGNAL_AUTH_USERS: ${NOSIGNAL_AUTH_USERS:?set_NOSIGNAL_AUTH_USERS}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://nosignal.site}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://nosignal:${POSTGRES_PASSWORD}@db:5432/nosignal}
      UPLOAD_ROOT: "uploads"
      ALLOW_INSECURE_DEFAULTS: ${ALLOW_INSECURE_DEFAULTS:-false}
      AUTO_CREATE_SCHEMA: ${AUTO_CREATE_SCHEMA:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
    volumes:
      - nosignal_uploads:/app/uploads
    networks:
      - nosignal-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.nosignal.site}
    container_name: nosignal-frontend
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - nosignal-network

volumes:
  nosignal_db:
  nosignal_uploads:

networks:
  nosignal-network:
    name: nosignal-network
    driver: bridge
